name: NL Runtime Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Unit tests
        run: pytest -q

      - name: Skip optional E2E runtime gate (no project path configured)
        if: ${{ vars.E2E_PROJECT_PATH == '' }}
        run: echo "Skipping runtime E2E gate because vars.E2E_PROJECT_PATH is empty"

      - name: Optional E2E runtime gate
        if: ${{ vars.E2E_PROJECT_PATH != '' }}
        env:
          E2E_PROJECT_PATH: ${{ vars.E2E_PROJECT_PATH }}
          E2E_GODOT_PATH: ${{ vars.E2E_GODOT_PATH }}
        run: |
          CMD=(python scripts/verify_nl_runtime.py --project "$E2E_PROJECT_PATH")
          if [ -n "$E2E_GODOT_PATH" ]; then
            CMD+=(--godot-path "$E2E_GODOT_PATH")
          fi
          "${CMD[@]}"
